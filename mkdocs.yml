site_name: Field Observation for Remote Sensing Training
site_description: Documentation for grassland field observations and training data preparation.
site_url: https://landwerk-ev.github.io/FieldObservation4RStrainig/
repo_url: https://github.com/Landwerk-eV/FieldObservation4RStrainig
repo_name: FieldObservation4RStrainig on GitHub
use_directory_urls: true

theme:
  name: shadcn

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences

nav:
  - Home: index.md
  - Grassland Observation Framework:
      - Overview and Objectives: framework/index.md
      - Observation Workflow: framework/workflow.md
      - Observation Notation: framework/notation.md
  - Classification Scheme:
      - Grassland Types: classification/grassland-types.md
      - Events and Status: classification/events-status.md
      - Intensity and Certainty: classification/intensity-certainty.md
  - Data Publication:
      - Data Lifecycle and Publishing: publishing/index.md
      - Source Presentation: source-presentation.md